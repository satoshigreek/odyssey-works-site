  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

/ 02<\u002Fspan>\n        <h4>The full stack, one desk<\u002Fh4>\n        <p>AI, blockchain, and enterprise transformation under a single advisor — so strategy stays coherent instead of stitched together from three vendors.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"why reveal\">\n        <span class=\"why-num\">/ 03<\u002Fspan>\n        <h4>C-suite credibility<\u002Fh4>\n        <p>Reported to Charles Hoskinson and carried strategy into Fortune 500 boardrooms and government programs. Comfortable where the decisions are actually made.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"why reveal\">\n        <span class=\"why-num\">/ 04<\u002Fspan>\n        <h4>Skin in the game<\u002Fh4>\n        <p>Active operating roles and real capital at risk — not detached consulting from the sidelines. The advice comes from someone living with the outcome.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ SERVICES ══════════ -->\n<section class=\"block\" id=\"services\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"reveal\"><div class=\"label\"><span class=\"dash\"><\u002Fspan>§ 02 — Practices<\u002Fdiv><\u002Fdiv>\n      <div class=\"sec-head-r reveal\"><h2 class=\"h-lg\">Three pillars of <span class=\"grad-text\">transformation.<\u002Fspan><\u002Fh2><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"svc-grid\">\n      <div class=\"svc reveal\">\n        <span class=\"svc-idx\">/ 01<\u002Fspan>\n        <h3>AI Strategy &amp; Implementation<\u002Fh3>\n        <p>From generative AI integration to agentic workflows and enterprise LLM deployment. Move beyond experimentation to production-grade AI that drives measurable ROI.<\u002Fp>\n        <div class=\"tags\"><span class=\"tag\">Generative AI<\u002Fspan><span class=\"tag\">LLM Ops<\u002Fspan><span class=\"tag\">Agents<\u002Fspan><span class=\"tag\">RAG<\u002Fspan><span class=\"tag\">Automation<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"svc reveal\">\n        <span class=\"svc-idx\">/ 02<\u002Fspan>\n        <h3>Blockchain &amp; Digital Assets<\u002Fh3>\n        <p>Deep protocol-level expertise across UTXO and EVM architectures. Tokenomics, DeFi strategy, enterprise blockchain deployment, and compliance frameworks.<\u002Fp>\n        <div class=\"tags\"><span class=\"tag\">Tokenomics<\u002Fspan><span class=\"tag\">DeFi<\u002Fspan><span class=\"tag\">Smart Contracts<\u002Fspan><span class=\"tag\">RWA<\u002Fspan><span class=\"tag\">Compliance<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"svc reveal\">\n        <span class=\"svc-idx\">/ 03<\u002Fspan>\n        <h3>Digital Transformation<\u002Fh3>\n        <p>End-to-end strategic advisory for the convergence of AI, Web3, and emerging technology. Align technology roadmaps with business outcomes for governments and enterprises.<\u002Fp>\n        <div class=\"tags\"><span class=\"tag\">Strategy<\u002Fspan><span class=\"tag\">Roadmapping<\u002Fspan><span class=\"tag\">Gov &amp; Enterprise<\u002Fspan><span class=\"tag\">Change Mgmt<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ TRACK RECORD ══════════ -->\n<section class=\"block\" id=\"track-record\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"reveal\"><div class=\"label\"><span class=\"dash\"><\u002Fspan>§ 03 — Experience<\u002Fdiv><\u002Fdiv>\n      <div class=\"sec-head-r reveal\"><h2 class=\"h-lg\">A career defined by <span class=\"grad-text\">execution.<\u002Fspan><\u002Fh2><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"tl\">\n      <div class=\"reveal\" style=\"display:contents\"><div class=\"tl-date\">2024 — Present<\u002Fdiv>\n        <div class=\"tl-content\"><h4>CEO, HAL8 &amp; Co-Founder, Apex Fusion<\u002Fh4><p>Building federated blockchain infrastructure. Tri-chain architecture uniting UTXO + EVM. $6M raised, 270+ validators, $60M+ staked. Recognized at Cardano Summit 2025 Berlin.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:contents\"><div class=\"tl-date\">2019 — 2024<\u002Fdiv>\n        <div class=\"tl-content\"><h4>CCO — IOHK / Cardano<\u002Fh4><p>Joined when ADA was cents. Nearly five years through the DeFi / NFT boom. Led enterprise and government strategy. Reported to Charles Hoskinson. Bridged blockchain with Fortune 500 needs.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:contents\"><div class=\"tl-date\">2023<\u002Fdiv>\n        <div class=\"tl-content\"><h4>Founded Odyssey Works Inc.<\u002Fh4><p>Established strategic advisory at the intersection of AI, blockchain, and digital transformation for enterprises navigating Web 3.0 adoption.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"reveal\" style=\"display:contents\"><div class=\"tl-date\">Prior<\u002Fdiv>\n        <div class=\"tl-content\" style=\"border-bottom:none\"><h4>Enterprise — Dell, CSC<\u002Fh4><p>$3B+ in successful technology pursuits. Commercial Director at Dell for hybrid cloud. Chief Negotiator for global contracts at CSC. Fortune 500 systems integration at scale. McGill Engineering + MBA.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ PIPELINE ══════════ -->\n<section class=\"block\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"reveal\"><div class=\"label\"><span class=\"dash\"><\u002Fspan>§ 04 — Current Engagements<\u002Fdiv><\u002Fdiv>\n      <div class=\"sec-head-r reveal\"><h2 class=\"h-lg\">Active <span class=\"grad-text\">pipeline.<\u002Fspan><\u002Fh2><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"pipe-list\">\n      <div class=\"pipe reveal\">\n        <div class=\"pipe-val grad-text\">Apex Fusion<\u002Fdiv>\n        <div class=\"pipe-body\"><h4>Tri-Chain Blockchain Architecture<\u002Fh4><p>Co-founded and hands-on building Apex Fusion — production tri-chain infrastructure uniting UTXO and EVM, live in market and scaling.<\u002Fp><\u002Fdiv>\n        <span class=\"pipe-status live\">Active<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pipe reveal\">\n        <div class=\"pipe-val\">$100M<\u002Fdiv>\n        <div class=\"pipe-body\"><h4>Tokenized Real Estate<\u002Fh4><p>Structuring a large-scale real-world asset tokenization engagement for an institutional-grade real estate portfolio.<\u002Fp><\u002Fdiv>\n        <span class=\"pipe-status\">In Progress<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"pipe reveal\" style=\"border-bottom:none\">\n        <div class=\"pipe-val\">$150M<\u002Fdiv>\n        <div class=\"pipe-body\"><h4>Strategic Acquisition<\u002Fh4><p>Advising on a significant acquisition bridging traditional enterprise infrastructure with blockchain-native technology.<\u002Fp><\u002Fdiv>\n        <span class=\"pipe-status\">In Progress<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ MEDIA ══════════ -->\n<section class=\"block\" id=\"media\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <div class=\"reveal\"><div class=\"label\"><span class=\"dash\"><\u002Fspan>§ 05 — Library<\u002Fdiv><\u002Fdiv>\n      <div class=\"sec-head-r reveal\">\n        <h2 class=\"h-lg\" style=\"margin-bottom:22px\">In the <span class=\"grad-text\">conversation.<\u002Fspan><\u002Fh2>\n        <p class=\"lede\">Featured across leading blockchain and technology publications, podcasts, summits, and industry events worldwide.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"media-group reveal\">\n      <div class=\"media-cat\"><span class=\"cat-name\">Video Interviews &amp; Talks<\u002Fspan><span>08<\u002Fspan><\u002Fdiv>\n      <div class=\"m-grid-3\">\n        <a href=\"https://www.youtube.com/watch?v=jhkZfnpqBiI\" target=\"_blank\" rel=\"noopener\" class=\"m-card\" onclick=\"return openVid('jhkZfnpqBiI')\">\n          <div class=\"m-thumb\"><img loading=\"lazy\" src=\"htt \n\n<script>\n// nav scroll\nwindow.addEventListener('scroll', function(){\n  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 30);\n});\n// menu\nfunction toggleMenu(){\n  var open = document.body.classList.toggle('menu-open');\n  document.getElementById('menuOverlay').classList.toggle('open', open);\n  document.getElementById('menuOverlay').setAttribute('aria-hidden', open ? 'false' : 'true');\n  document.getElementById('menuBtn').setAttribute('aria-expanded', open ? 'true' : 'false');\n}\ndocument.addEventListener('keydown', function(e){\n  if(e.key === 'Escape'){\n    if(document.getElementById('vidModal').classList.contains('open')) closeVid();\n    else if(document.body.classList.contains('menu-open')) toggleMenu();\n  }\n});\n// video lightbox (YouTube facade — loads the embed only on click)\nfunction openVid(id){\n  var h=document.getElementById('vidHolder');\n  h.innerHTML='<iframe src=\"https://www.youtube.com/embed/'+id+'?autoplay=1&rel=0\" title=\"Video player\" allow=\"autoplay; encrypted-media; picture-in-picture; fullscreen\" allowfullscreen><\u002Fiframe>';\n  document.getElementById('vidModal').classList.add('open');\n  document.body.style.overflow='hidden';\n  return false;\n}\nfunction closeVid(e){\n  if(e && e.target && e.target.closest('.vid-frame')) return;\n  document.getElementById('vidModal').classList.remove('open');\n  document.getElementById('vidHolder').innerHTML='';\n  document.body.style.overflow='';\n}\ndocument.getElementById('menuOverlay').addEventListener('click', function(e){\n  if(e.target === this) toggleMenu();\n});\n// reveal\n(function(){\n  function show(el){ el.classList.add('visible'); el.style.setProperty('opacity','1','important'); el.style.setProperty('transform','none','important'); }\n  function initReveal(){\n    var els = document.querySelectorAll('.reveal');\n    if(!els.length) return;\n    var failsafe = setTimeout(function(){ els.forEach(show); }, 1200);\n    if(!('IntersectionObserver' in window)){\n      els.forEach(show); clearTimeout(failsafe); return;\n    }\n    var obs = new IntersectionObserver(function(entries){\n      entries.forEach(function(e){ if(e.isIntersecting){ show(e.target); obs.unobserve(e.target); } });\n    }, {threshold:0.05, rootMargin:'0px 0px -40px 0px'});\n    els.forEach(function(el){ obs.observe(el); });\n    requestAnimationFrame(function(){\n      var vh = window.innerHeight || document.documentElement.clientHeight;\n      els.forEach(function(el){\n        if(el.getBoundingClientRect().top < vh){ show(el); obs.unobserve(el); }\n      });\n    });\n  }\n  if(document.readyState === 'loading'){\n    document.addEventListener('DOMContentLoaded', initReveal);\n  } else {\n    initReveal();\n  }\n  window.addEventListener('load', initReveal);\n})();\n\n// stat count-up\n(function(){\n  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;\n  function fmt(el, val){\n    var pre = el.getAttribute('data-prefix') || '';\n    var suf = el.getAttribute('data-suffix') || '';\n    el.textContent = pre + Math.round(val) + suf;\n  }\n  function run(el){\n    if(el.dataset.counted) return;\n    el.dataset.counted = '1';\n    var target = parseFloat(el.getAttribute('data-count'));\n    if(isNaN(target)) return;\n    if(reduce){ fmt(el, target); return; }\n    var dur = 1100, start = null;\n    function step(ts){\n      if(start === null) start = ts;\n      var p = Math.min((ts - start) / dur, 1);\n      var eased = 1 - Math.pow(1 - p, 3); // easeOutCubic — fast then settle\n      fmt(el, target * eased);\n      if(p < 1){ requestAnimationFrame(step); } else { fmt(el, target); }\n    }\n    requestAnimationFrame(step);\n  }\n  function init(){\n    var els = document.querySelectorAll('.hstat-num[data-count]');\n    if(!els.length) return;\n    if(!('IntersectionObserver' in window)){\n      els.forEach(run); return;\n    }\n    var obs = new IntersectionObserver(function(entries){\n      entries.forEach(function(e){ if(e.isIntersecting){ run(e.target); obs.unobserve(e.target); } });\n    }, {threshold:0.4});\n    els.forEach(function(el){ obs.observe(el); });\n  }\n  if(document.readyState === 'loading'){\n    document.addEventListener('DOMContentLoaded', init);\n  } else {\n    init();\n  }\n})();\n\n// chat\nvar chatOpen=false;\nfunction toggleChat(){ chatOpen=!chatOpen; document.getElementById('chatWindow').classList.toggle('open',chatOpen); }\nfunction sendQuick(t){ document.getElementById('chatQuick').style.display='none'; document.getElementById('chatInput').value=t; sendMessage(); }\n\nvar kb={\n  services:{keys:['service','offer','do you do','help with','what do you','capabilities','how can you help','what can you','work on','specialize','expertise','practice','advisory'],resp:'Odyssey Works provides three core advisory practices:\\n\\n**1. AI Strategy & Implementation**\\nGenerative AI, LLM operations, AI agent design, RAG systems, and enterprise automation.\\n\\n**2. Blockchain & Digital Assets**\\nTokenomics, DeFi architecture, smart contracts, RWA tokenization, and regulatory compliance.\\n\\n**3. Digital Transformation Advisory**\\nStrategic roadmapping, enterprise architecture, government consulting, and M&A technology due diligence.\\n\\nWhich area interests you most?'},\n  leadership:{keys:['leader','team','founder','who','background','bio','about us','about you','ceo','principal','partner','executive'],resp:'Founded by a C-suite executive combining deep technical knowledge with enterprise commercial leadership:\\n\\n**Blockchain**\\n- CCO at IOHK / Cardano (~5 years), reporting to Charles Hoskinson\\n- Co-founded Apex Fusion — $6M raised, 270+ validators, $60M+ staked\\n- CEO of HAL8 — open-source interoperability\\n\\n**Enterprise**\\n- Commercial Director at Dell, Chief Negotiator at CSC / DXC\\n- $3B+ in Fortune 500 pursuits\\n\\n**Education**\\n- McGill: B.Eng + M.Eng (Nonlinear Dynamics & Chaos Theory)\\n- MBA, College des Ingeni
